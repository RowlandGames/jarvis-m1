<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS M1 Terminal</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Courier New', Courier, monospace; padding: 20px; margin: 0; background: #0a0f1d; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95vh; color: #00e5ff; }
        #chat-container { width: 100%; max-width: 550px; background: #111827; border-radius: 8px; border: 1px solid #00e5ff; box-shadow: 0 0 20px rgba(0, 229, 255, 0.25); padding: 15px; }
        #box { border: 1px solid #1f2937; background: #030712; padding: 12px; height: 380px; overflow-y: auto; border-radius: 5px; margin-bottom: 12px; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .msg { margin: 10px 0; padding: 10px 12px; border-radius: 6px; font-size: 14px; line-height: 1.5; max-width: 88%; word-wrap: break-word; }
        .user { background: #00e5ff; color: #0a0f1d; margin-left: auto; font-weight: bold; box-shadow: 0 0 8px rgba(0, 229, 255, 0.4); }
        .ai { background: #1f2937; color: #e5e7eb; border-left: 3px solid #00e5ff; }
        .ai b { color: #00e5ff; }
        #input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #00e5ff; background: #030712; color: #00e5ff; border-radius: 4px; font-size: 14px; font-family: 'Courier New', monospace; outline: none; }
        input:focus { box-shadow: 0 0 8px rgba(0, 229, 255, 0.5); }
        input::placeholder { color: rgba(0, 229, 255, 0.35); }
        button { background: #00e5ff; color: #0a0f1d; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: 'Courier New', monospace; transition: all 0.2s ease; }
        button:hover { background: #ffffff; box-shadow: 0 0 12px #ffffff; }
    </style>
</head>
<body>

    <div id="chat-container">
        <h3 style="margin: 0 0 10px 0; color: #00e5ff; letter-spacing: 2px; font-size: 16px; border-bottom: 1px dashed rgba(0, 229, 255, 0.3); padding-bottom: 8px;">SYSTEM // JARVIS M1 // ONLINE</h3>
        <div id="box">
            <div class="msg ai"><b>JARVIS M1:</b> Core protocols initialized. Web search capabilities active. State your request.</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-msg" placeholder="Awaiting hardware command..." onkeypress="handleKey(event)" autocomplete="off">
            <button onclick="send()">EXECUTE</button>
        </div>
    </div>

    <script>
        const box = document.getElementById('box');
const userMsg = document.getElementById('user-msg');

async function send() {
    const text = userMsg.value.trim();
    if (!text) return;

    append(text, 'user', 'USER');
    userMsg.value = '';

    const id = append("Querying web matrices...", 'ai', 'JARVIS M1');

    try {
        // Upgraded personality instruction to match my specific tone constraints
        const contextRule = "Respond with high information density. Use short sentences under 10 words. Use bold text anchors. Use punchy lists. Do not use conversational filler. Question: ";
        
        // Swapped to a direct text endpoint with integrated searchgpt bypass features
        const url = `https://pollinations.ai{encodeURIComponent(contextRule + text)}?json=false&model=searchgpt`;
        
        const res = await fetch(url);
        
        if (!res.ok) throw new Error("Server handshake dropped.");
        
        let data = await res.text();
        
        // Clean markdown bold notation converts to html elements
        data = data.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

        document.getElementById(id).innerHTML = `<b>JARVIS M1:</b> ${data}`;
    } catch (err) {
        document.getElementById(id).innerHTML = `<b>JARVIS M1:</b> Connection failure. Retrying uplink protocols...`;
    }
}

function append(text, type, label) {
    const div = document.createElement('div');
    const id = 'm-' + Date.now();
    div.id = id;
    div.className = `msg ${type}`;
    div.innerHTML = `<b>${label}:</b> ${text}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return id;
}

function handleKey(e) {
    if (e.key === 'Enter') send();
}

    </script>

</body>
</html>
